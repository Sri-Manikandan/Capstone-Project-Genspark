    <section class="mb-10">
      <p class="eyebrow text-plum">What's on · Live this season</p>
      <h1 class="page-title mt-3 max-w-3xl text-balance">
        Find the night you'll <span class="italic text-plum">remember</span>.
      </h1>
      <p class="mt-4 max-w-xl text-base text-ink-soft">
        Concerts, conferences and shows — pick your seat and walk in with a ticket on your phone.
      </p>

      <div class="mt-7 rounded-2xl border border-line bg-surface p-2 shadow-card">
        <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
          <input [formControl]="search" aria-label="Search events, artists, venues" placeholder="Search events, artists, venues…"
                 class="flex-1 rounded-xl border-0 bg-transparent px-3 py-2.5 text-sm text-ink placeholder:text-muted/70 focus:outline-none focus:ring-0" />

          <select aria-label="Filter by category" [value]="store.filters().category" (change)="setCategory($any($event.target).value)"
                  class="rounded-xl border-0 bg-paper px-3 py-2.5 text-sm text-ink focus:outline-none focus:ring-0 sm:w-44">
            <option value="">All categories</option>
            <option *ngFor="let cat of store.categories()" [value]="cat">{{ cat }}</option>
          </select>

          <select aria-label="Sort events" [value]="store.filters().sortBy + ':' + store.filters().sortOrder" (change)="setSort($any($event.target).value)"
                  class="rounded-xl border-0 bg-paper px-3 py-2.5 text-sm text-ink focus:outline-none focus:ring-0 sm:w-44">
            <option value="startTime:asc">Date · soonest first</option>
            <option value="startTime:desc">Date · latest first</option>
            <option value="title:asc">Title · A–Z</option>
            <option value="title:desc">Title · Z–A</option>
            <option value="createdAt:desc">Newly added</option>
          </select>
        </div>

        <div class="mt-2 flex flex-col gap-2 border-t border-line pt-2 sm:flex-row sm:items-center">
          <label class="flex items-center gap-2 px-1 text-xs text-muted">
            From
            <input type="date" aria-label="Start date from" [value]="store.filters().startFrom" (change)="setStartFrom($any($event.target).value)"
                   class="rounded-xl border-0 bg-paper px-3 py-2 text-sm text-ink focus:outline-none focus:ring-0" />
          </label>
          <label class="flex items-center gap-2 px-1 text-xs text-muted">
            To
            <input type="date" aria-label="Start date to" [value]="store.filters().startTo" (change)="setStartTo($any($event.target).value)"
                   class="rounded-xl border-0 bg-paper px-3 py-2 text-sm text-ink focus:outline-none focus:ring-0" />
          </label>
          <button type="button" (click)="clearFilters()" class="btn-ghost sm:ml-auto">Clear filters</button>
        </div>
      </div>
    </section>

    <div class="mb-5 flex items-baseline justify-between">
      <h2 class="section-title">Upcoming events</h2>
      <span class="eyebrow hidden sm:block">Page {{ store.page() }} of {{ totalPages() }}</span>
    </div>

    <ems-alert type="error" [message]="error()" (dismissed)="error.set('')" />
    <ems-loading-spinner *ngIf="loading()" />

    <div *ngIf="!loading()" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
      <ems-event-card *ngFor="let ev of events()" [event]="ev" />
    </div>

    <div *ngIf="!loading() && events().length === 0" class="card mt-2 px-6 py-16 text-center">
      <p class="font-display text-xl text-ink">No events match your search</p>
      <p class="mt-1 text-sm text-muted">Try a different keyword or clear the filters.</p>
    </div>

    <ems-pagination [currentPage]="store.page()" [totalPages]="totalPages()" (pageChange)="goToPage($event)" />
